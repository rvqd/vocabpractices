<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Psych Vocab Match Quiz</title>
  <style>
    :root {
      --bg: #0d1220;
      --card: #151b2e;
      --card2: #1d2540;
      --text: #f8fafc;
      --muted: #a7b0c4;
      --line: rgba(255,255,255,.12);
      --blue: #7c9cff;
      --green: #56d890;
      --red: #ff6b6b;
      --yellow: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(124,156,255,.25), transparent 32%),
                  radial-gradient(circle at bottom right, rgba(86,216,144,.16), transparent 30%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 28px 14px;
    }
    .app { width: min(980px, 100%); }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(28px, 5vw, 48px); letter-spacing: -.04em; }
    .sub { color: var(--muted); margin: 6px 0 0; }
    .pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }
    .grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 22px 80px rgba(0,0,0,.28);
      padding: 22px;
    }
    .definition-label { color: var(--blue); text-transform: uppercase; letter-spacing: .14em; font-size: 12px; font-weight: 900; }
    .definition { font-size: clamp(20px, 3vw, 30px); line-height: 1.25; font-weight: 800; margin: 12px 0 18px; }
    .choices { display: grid; gap: 10px; }
    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .choice {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 15px 16px;
      border-radius: 16px;
      font-weight: 800;
    }
    .choice:hover { transform: translateY(-1px); border-color: rgba(124,156,255,.55); }
    .choice.correct { background: rgba(86,216,144,.17); border-color: rgba(86,216,144,.75); }
    .choice.wrong { background: rgba(255,107,107,.16); border-color: rgba(255,107,107,.75); }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .btn {
      background: var(--blue);
      color: #071024;
      font-weight: 900;
      padding: 12px 16px;
      border-radius: 14px;
    }
    .btn.secondary { background: rgba(255,255,255,.08); color: var(--text); border: 1px solid var(--line); }
    .btn:hover { transform: translateY(-1px); }
    .feedback { min-height: 28px; margin-top: 14px; font-weight: 900; }
    .feedback.good { color: var(--green); }
    .feedback.bad { color: var(--red); }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat { background: rgba(255,255,255,.055); border: 1px solid var(--line); border-radius: 18px; padding: 14px; }
    .stat b { display:block; font-size: 26px; }
    .stat span { color: var(--muted); font-size: 13px; font-weight: 700; }
    .search {
      width: 100%;
      margin-top: 14px;
      background: rgba(255,255,255,.07);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }
    .list { margin-top: 12px; max-height: 360px; overflow: auto; padding-right: 4px; }
    .item { border-bottom: 1px solid var(--line); padding: 11px 2px; }
    .item strong { color: var(--text); }
    .item p { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .hidden { display: none; }
    .tiny { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 12px; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>AP Psych Vocab Match</h1>
        <p class="sub">Match the definition to the correct term. Randomized every round.</p>
      </div>
      <div class="pill" id="totalPill">0 words loaded</div>
    </header>

    <section class="grid">
      <div class="card">
        <div class="definition-label">Definition</div>
        <div class="definition" id="definition">Loading...</div>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <div class="controls">
          <button class="btn" id="nextBtn">Next</button>
          <button class="btn secondary" id="showBtn">Show answer</button>
          <button class="btn secondary" id="restartBtn">Restart</button>
        </div>
      </div>

      <aside class="card">
        <div class="stats">
          <div class="stat"><b id="score">0</b><span>Correct</span></div>
          <div class="stat"><b id="missed">0</b><span>Missed</span></div>
          <div class="stat"><b id="streak">0</b><span>Streak</span></div>
          <div class="stat"><b id="progress">0/0</b><span>Progress</span></div>
        </div>
        <input class="search" id="search" placeholder="Search words or definitions..." />
        <div class="list" id="list"></div>
        <p class="tiny">Tip: press <b>1–4</b> to answer, <b>Enter</b> for next, and <b>S</b> to show the answer.</p>
      </aside>
    </section>
  </main>

  <script>
    const VOCAB = [{"term": "Evolutionary Perspective", "definition": "The study of how natural selection affects the expression of behavior and mental processes to increase survival and reproductive success."}, {"term": "Behavioral Perspective", "definition": "The study of observable behavior, typically through the use of operant conditioning and intermittent reinforcement. Behaviorists have traditionally focused on observable behavior to the exclusion of mental processes."}, {"term": "Psychodynamic Perspective", "definition": "The study of how unconscious drives and conflicts influence behavior, and uses that information to treat people with psychological disorders."}, {"term": "Humanistic Perspective", "definition": "The study which emphasizes the growth potential of healthy people."}, {"term": "Cognitive Perspective", "definition": "The study of all the mental activities associated with thinking, knowing, remembering, and communicating."}, {"term": "Sociocultural Perspective", "definition": "The study of how biological, psychological, and social factors affect an individual's behavior and thinking."}, {"term": "Biological Perspective", "definition": "The study of the links between biological and psychological processes."}, {"term": "Scenario", "definition": "A hypothetical or imagined sequence of events that could occur in a given situation."}, {"term": "Cultural Norms", "definition": "The enduring behaviors, ideas, attitudes, values, and traditions shared by a group of people and transmitted from one generation to the next."}, {"term": "Expectations", "definition": "Beliefs about what will happen in the future based on past experiences, assumptions, and cultural norms."}, {"term": "Circumstances", "definition": "The particular condition or fact that affects a scenario."}, {"term": "Cognitive Biases", "definition": "Our own biases which can impact our perception of events, and impact different experiments, research and studies."}, {"term": "Confirmation Bias", "definition": "The tendency to seek out information that aligns with our point of view, while at the same time dismissing information that challenges our beliefs."}, {"term": "Hindsight Bias", "definition": "The tendency to believe, after learning an outcome, that one would have foreseen it. Also known as the I-knew-it-all along phenomenon."}, {"term": "Overconfidence Bias", "definition": "The tendency to overestimate our knowledge and abilities in a certain area."}, {"term": "Experimental Methodology", "definition": "Designed to be carried out under controlled conditions, with the goal being to test a hypothesis and establish a causal relationship between independent and dependent variables."}, {"term": "Non-Experimental Methodology", "definition": "Used in research where a controlled experiment is not possible or ethical in order to describe behavior, this method cannot be used to establish a causal relationship between independent and dependent variables. Examples of the Non-Experimental Methodology include: Case Studies, Correlation, Meta-Analysis and Naturalistic Observation."}, {"term": "Case Study", "definition": "Involves an in-depth analysis of one group or participant over a period of time. A case study cannot be generalized to the larger population."}, {"term": "Correlation", "definition": "A study which analyzes and observes the predictable relationship between variables.Correlation does not mean causation."}, {"term": "Meta-Analysis", "definition": "A statistical technique which collects and organizes data from previous studies to reach a conclusion."}, {"term": "Naturalistic Observation", "definition": "When researchers do not interact with their subject but rather observe behaviors in the natural environment without manipulating or controlling the situation."}, {"term": "Hypothesis", "definition": "A testable prediction."}, {"term": "Falsifiable Hypothesis", "definition": "A testable prediction which if the data do not support it, the hypothesis can be rejected (making it falsifiable)."}, {"term": "Operational Definition", "definition": "A carefully worded statement of the exact procedures (operations) used in a research study and measures how the variables are manipulated in the study."}, {"term": "Experiment", "definition": "A research method in which a researcher manipulates an independent variable to observe its effect on the dependent variable."}, {"term": "Independent Variable", "definition": "The manipulated variable whose effect is being studied."}, {"term": "Dependent Variable", "definition": "The outcome or what is measured in a study; the variable that may change in response to manipulations of the independent variable."}, {"term": "Confounding Variables", "definition": "A factor other than the independent variable that might produce an effect in an experiment."}, {"term": "Sample", "definition": "The selected group of individuals in a population which represent the entire population in a study."}, {"term": "Population", "definition": "All those in a group being studied, from which samples may be drawn."}, {"term": "Representative Sample", "definition": "When the sample group in the study represents all the different people in the population."}, {"term": "Random Sampling", "definition": "A sample that fairly represents a population because each member has an equal chance of inclusion."}, {"term": "Convenience Sampling", "definition": "When individuals are selected to participate in a study based on their availability."}, {"term": "Sampling Bias", "definition": "A flawed sampling process that produces an unrepresentative sample."}, {"term": "Generalizability", "definition": "The extent to which the results of a study can be applied to the general population."}, {"term": "Experimental Group", "definition": "In an experiment, the group exposed to the treatment, that is, to one version of the independent variable."}, {"term": "Control Group", "definition": "In an experiment, the group not exposed to the treatment; contrasts with the experimental group and serves as a comparison for evaluating the effect of the treatment."}, {"term": "Placebo Effect", "definition": "Occurs when a person experiences an improvement in their physical or mental health after being administered a fake treatment. The change is due to the person’s belief in the treatment."}, {"term": "Random Assignment", "definition": "Assigning participants to experimental and control groups at random, thus minimizing preexisting differences between the different groups."}, {"term": "Single-blind Procedures", "definition": "An experimental procedure in which the research participants are blind about whether they are in the experiment or control group, which helps prevent the placebo effect."}, {"term": "Double-blind Procedures", "definition": "An experimental procedure in which both the research participants and the research staff are blind about whether the research participants have received the treatment or a placebo."}, {"term": "Experimenter Bias", "definition": "The unknowing tendency of researchers' expectations, preferences, or beliefs influence the outcome of a study."}, {"term": "Social Desirability Bias", "definition": "The tendency of participants skewing their answers to create a more favorable impression of themselves."}, {"term": "Qualitative Measures", "definition": "Non-numerical data that provide detailed, descriptive insights into participants thoughts, feelings and behavior, for example interviews."}, {"term": "Interviews", "definition": "A qualitative research technique which involves an experimenter asking participants questions (generally on a one-to-one basis) and recording their responses."}, {"term": "Quantitative Measures", "definition": "Numerical data that can be statistically analyzed to identify different relationships, patterns and differences, for example numeric ratings."}, {"term": "Likert Scale", "definition": "A rating scale used to measure participant’s agreement with statements, to provide the researcher with quantifiable data on the participants attitudes or opinions."}, {"term": "Survey", "definition": "A technique for collecting self-reported responses to a series of questions, usually by questioning a representative, random sample of a particular group."}, {"term": "Self-Report Bias", "definition": "The tendency of participants to provide inaccurate or distorted information about themselves, their behaviors, or their experiences when asked to self-report."}, {"term": "Ethical Procedures", "definition": "The guidelines psychologists must follow as they do research in order to protect participants from harm and keep participant information confidential or anonymous."}, {"term": "Confidentiality", "definition": "The names, personal information, and scores of all participants must be kept private,Institutional Review Board (IRB)An ethics committee that screens research proposals in order to protect the safety of participants used in research."}, {"term": "Institutional Animal Care and Use Committee (IACUC)", "definition": "An ethics committee oversees the use of non-human animals in order to protect their safety in research."}, {"term": "Informed Consent", "definition": "An ethical principle that research participants be told enough to enable them to choose whether they wish to participate, especially when there is a potential for long-term effects."}, {"term": "Informed Assent", "definition": "A process through which minors are able to agree to participate with the additional consent of a parent or guardian, despite not being able to give legal consent to participate in a study."}, {"term": "Debriefing", "definition": "The post experimental explanation of a study, including its purpose and any deceptions, to its participants."}, {"term": "Peer Review", "definition": "When other experts in the field assess the research study’s methodology, data and conclusions before it is published in order to see if the scientific findings are reliable and valid."}, {"term": "Inferential Data", "definition": "Numerical data that allow one to generalize, to infer from sample data the probability of something being true of a population."}, {"term": "Statistical Significance", "definition": "A statistical statement of how reliable it is that an obtained result occurred by chance."}, {"term": "Effect Size", "definition": "A statistical measure that measures the strength of a relationship or difference between variables."}, {"term": "Mean", "definition": "The average of a distribution, obtained by adding the scores and then dividing by the number of scores."}, {"term": "Regression To The Mean", "definition": "The tendency of results that are extreme by chance on first measurement—i.e. extremely higher or lower than average—to move closer to the average when measured repeatedly."}, {"term": "Median", "definition": "The middle score in a distribution; half the scores are above it and half are below it."}, {"term": "Mode", "definition": "The most frequently occurring score(s) in a distribution."}, {"term": "Range", "definition": "The difference between the highest and lowest scores in a distribution."}, {"term": "Standard Deviation", "definition": "A measure of how the average score is clustered around the mean of a distribution."}, {"term": "Central Tendency", "definition": "A statistic that identifies a single value as representative of the entire distribution of data. For example, Mean, Median,."}, {"term": "Variation", "definition": "How spread the scores in a distribution are or how much the scores vary from each other."}, {"term": "Percentile Rank", "definition": "The percentage of scores at or below a particular score."}, {"term": "Normal Curve", "definition": "A symmetrical, bell-shaped curve that describes the distribution of many types of data; most scores fall near the mean (about 68% fall within one standard deviation of it) and fewer and fewer near the extremes."}, {"term": "Skewness", "definition": "A representation of scores that lack symmetry around their average value."}, {"term": "Bimodal Distribution", "definition": "Occurs when two different values appear most frequently (modes) in the data set."}, {"term": "Correlational Research", "definition": "Studies which seek to determine the relationship between two variables in order to make predictions on what will happen in a study."}, {"term": "Scatterplot", "definition": "A graphed cluster of dots, each of which represents the values of two variables. The slope of the points suggests the direction of the relationship between the two variables. The amount of scatter suggests the strength of the correlation."}, {"term": "Correlation Coefficient", "definition": "A statistical index of the relationship between two variables (from -1.0 to +1.0)."}, {"term": "Defensible Claim", "definition": "A statement or argument that is supported by logical reasoning or evidence, allowing it to be supported in a debate or discussion."}, {"term": "Scientifically Derived Evidence", "definition": "Information, data, or conclusions that are obtained through the scientific method such as controlled experiments. It must be objective, can be replicated, has gone through peer review, and the findings must be reliable and based on factual procedures."}, {"term": "Support", "definition": "Evidence and reasoning which explains why a claim should be confirmed."}, {"term": "Refute", "definition": "Evidence and reasoning which contradicts a claim and demonstrates why it should be rejected."}, {"term": "Modify", "definition": "Adjustments to a claim in order to accurately reflect new information."}, {"term": "Interaction", "definition": "The interplay that occurs when the effect of one factor (such as environment) depends on another factor (such as heredity)."}, {"term": "Heredity", "definition": "Also known as “nature,” refers to genetic or predisposed characteristics that influence physical, behavioral, and mental traits and processes."}, {"term": "Environmental Factors", "definition": "Also known as “nurture,” refers to the external factors that one experiences."}, {"term": "Twin Studies", "definition": "A study conducted on identical twins."}, {"term": "Family Studies", "definition": "A study which examines the patterns of a specific trait or behavior within a family. Essentially questioning if a certain trait, “runs in the family.”Adoption StudiesA study which compares people in different family relationships to understand how heredity and environmental factors affect traits and behavior."}, {"term": "The Nervous System", "definition": "The body’s speedy, electrochemical communication network, consisting of all the nerve cells of the peripheral and central nervous systems."}, {"term": "Central Nervous System", "definition": "Interacts with all processes in the body and includes the brain and the spinal cord."}, {"term": "Peripheral Nervous System", "definition": "Relays messages from the central nervous system to the rest of the body and includes the autonomic and somatic nervous systems."}, {"term": "Autonomic Nervous System", "definition": "Governs processes that are involuntary such as breathing and blood pressure, this system includes the parasympathetic and sympathetic nervous systems."}, {"term": "Sympathetic Nervous System", "definition": "The part of the autonomic nervous system that helps the body respond to stress by slowing digestive functions, elevating arousal, and preparing the body for action. It controls the fight-or-flight response."}, {"term": "Parasympathetic Nervous System", "definition": "The part of the autonomic nervous system that serves to calm the body, returning it to homeostasis following a fight-or-flight response, it instigates digestion of food, conserves its energy and allows the body to rest and repair."}, {"term": "Somatic Nervous System", "definition": "Governs processes that are voluntary such as the voluntary movement of muscles."}, {"term": "Neurons", "definition": "Neural cells that create and transmit electrical impulses between cells."}, {"term": "Glial Cells", "definition": "Cells that provide structure, insulation, communication, and waste removal functions for neurons."}, {"term": "Reflex Arc", "definition": "Involve both the PNS and CNS working together. The PNS detects the sensory input (such as heat), sends a rapid signal to the CNS on sensory neurons, and interneurons in the spinal cord of the CNS coordinate the appropriate motor response (like withdrawing the hand) without thinking."}, {"term": "Sensory Neurons", "definition": "Neurons that carry incoming information from the sensory receptors to the brain and spinal cord."}, {"term": "Motor Neurons", "definition": "Neurons that carry outgoing information from the brain and spinal cord to the muscles and glands."}, {"term": "Interneurons", "definition": "Neurons within the brain and spinal cord that communicate internally and intervene between the sensory inputs and motor outputs."}, {"term": "Neural Transmission", "definition": "The process of transferring information between neurons which occurs in an orderly, systematic way and involves the all-or-nothing principle, depolarization, refractory period, resting potential, reuptake, and threshold. Disruptions to this process could lead to disorders such as multiple sclerosis or myasthenia gravis."}, {"term": "All-or-nothing Principle", "definition": "A neuron’s reaction of either firing with a full-strength response or not firing."}, {"term": "Depolarization", "definition": "When there's a shift in a neuron's electrical charge that allows an action potential (nerve impulse) to occur."}, {"term": "Refractory Period", "definition": "A period of inactivity after a neuron has fired."}, {"term": "Resting Potential", "definition": "The period when a neuron is at baseline and is not actively generating a neural impulse. During this time there are more negatively charged ions on the outside of the neuron relative to the inside."}, {"term": "Reuptake", "definition": "Th absorption of the neurotransmitter into the terminal buttons of the sending neuron."}, {"term": "Threshold", "definition": "The level of stimulation required to trigger a neural impulse."}, {"term": "Multiple Sclerosis", "definition": "A result of the deterioration in the myelin sheath, in which communication to muscles slows, with eventual loss of muscle control."}, {"term": "Myasthenia Gravis", "definition": "A chronic neuromuscular disease that causes weakness in the voluntary muscles."}, {"term": "Chemical messengers", "definition": "When released by the sending neuron, cross the synaptic gaps and bind to receptor sites on the receiving neuron, thereby influencing whether that neuron will generate a neural impulse."}, {"term": "Action Potential", "definition": "The electrical impulse which travels down the axon, resulting in the release of neurotransmitters into the synapse."}, {"term": "Excitatory", "definition": "Making an action potential more likely."}, {"term": "Inhibitory", "definition": "Making an action potential less likely."}, {"term": "Dopamine", "definition": "A neurotransmitter which influences movement, learning, attention, and emotion."}, {"term": "Serotonin", "definition": "A neurotransmitter which affects mood, hunger, sleep, and arousal."}, {"term": "Norepinephrine (Noradrenaline)", "definition": "A neurotransmitter which helps control alertness and arousal. It is heavily involved in the sleep cycle and low levels are associated with depression."}, {"term": "Glutamate", "definition": "An excitatory neurotransmitter involved in learning and memory."}, {"term": "GABA", "definition": "An inhibitory neurotransmitter for the central nervous system associated with anxiety-related disorders."}, {"term": "Endorphins", "definition": "A neurotransmitters linked to pain reduction and to pleasure; the body’s natural painkillers."}, {"term": "Substance p", "definition": "A neurotransmitter involved in pain signaling."}, {"term": "Acetylcholine (ACh)", "definition": "A neurotransmitter found in both central and peripheral nervous systems which enables muscle action, learning, and memory."}, {"term": "Hormones", "definition": "Chemical messengers that are manufactured by the endocrine glands travel through the bloodstream and affect other tissues."}, {"term": "Adrenaline (Epinephrine)", "definition": "Hormone which increases heart rate, blood pressure, and blood sugar, providing us with a surge of energy, known as the fight-or-flight response."}, {"term": "Leptin", "definition": "Hormone which causes the brain to increase metabolism and decrease hunger."}, {"term": "Ghrelin", "definition": "A hunger-arousing hormone secreted by an empty stomach."}, {"term": "Melatonin", "definition": "A sleep-inducing hormone released by the pineal gland."}, {"term": "Oxytocin", "definition": "A stress-moderating hormone related to bonding, attachment, and stress reduction."}, {"term": "Agonists", "definition": "A substance that mimics the actions of a neurotransmitter and encourages neural firing."}, {"term": "Antagonists", "definition": "A substance that inhibits or blocks a response to the activation of certain receptors on cells."}, {"term": "Reuptake Inhibitors", "definition": "A drug which blocks the reabsorption of neurotransmitters back into the cell."}, {"term": "Psychoactive drug", "definition": "Drugs which influence a neurotransmitter’s function in various ways throughout the neural communication process and can lead to tolerance and/or addiction, creating significant withdrawal symptoms."}, {"term": "Stimulants", "definition": "Psychoactive drugs such as caffeine and cocaine, which typically cause increased neural activity and activate the sympathetic nervous system."}, {"term": "Depressants", "definition": "Psychoactive drugs such as alcohol, which typically cause decreased neural activity. They can create drowsiness, sedation or sleep."}, {"term": "Hallucinogens", "definition": "Psychoactive drugs such as marijuana, which typically cause distortions in perception and/or cognition."}, {"term": "Opioids", "definition": "Psychoactive drugs such as heroin, which typically act as pain relievers and create powerful withdrawal symptoms."}, {"term": "Tolerance", "definition": "The phenomenon where the effects of a drug lessen with repeated exposure."}, {"term": "Addiction", "definition": "Compulsive craving of drugs or certain behaviors (such as gambling) despite known adverse consequences."}, {"term": "Withdrawal", "definition": "The discomfort and distress that follow discontinuing an addictive drug or behavior."}, {"term": "Brain Stem", "definition": "The central core of the brain, beginning where the spinal cord swells as it enters the skull, which includes the medulla."}, {"term": "Medulla", "definition": "The base of the brain stem which controls basic functioning such as breathing, heart rate and basic reflexes."}, {"term": "Reticular Activating System", "definition": "A nerve network that travels through the brainstem and thalamus and arouses the brain, playing an important role in alertness and consciousness."}, {"term": "Cerebellum", "definition": "The “little brain” at the rear of the brainstem which controls coordination of movement, balance, and some forms of procedural learning."}, {"term": "Cerebral Cortex", "definition": "The intricate fabric of interconnected neural cells covering the cerebral hemispheres which is divided into two hemispheres and includes the limbic system, corpus callosum, and the lobes of the cortex."}, {"term": "Limbic System", "definition": "Neural system (including the thalamus, hypothalamus, pituitary gland, hippocampus, amygdala) located below the cerebral hemispheres, associated with emotions and drives."}, {"term": "Thalamus", "definition": "The brain’s sensory control center; it directs sensory input from the peripheral nervous system, then sends it to the cortex for further processing."}, {"term": "Hypothalamus", "definition": "It directs several maintenance activities such as eating, drinking, flight or flight, and fornication and is linked to emotion and reward."}, {"term": "Pituitary Gland", "definition": "The endocrine system’s most influential gland. Under the influence of the hypothalamus, the pituitary regulates growth and controls other endocrine glands."}, {"term": "Hippocampus", "definition": "The part of your brain most involved in creating cognitive maps, processing and retrieving declarative memory and converts short-term memory to long-term."}, {"term": "Corpus Callosum", "definition": "A massive bundle of nerves connecting the two brain hemispheres. It allows constant communication between the right and left hemispheres."}, {"term": "Occipital Lobes", "definition": "Generally controls visual information processing and is located in the rear of the brain."}, {"term": "Temporal Lobes", "definition": "Generally controls auditory and linguistic processing and is located on the sides of the brain."}, {"term": "Parietal Lobes", "definition": "Generally controls association areas and the somatosensory cortex. These lobes are located near the back crown of the brain."}, {"term": "Somatosensory Cortex", "definition": "Part of the Parietal Lobe which processes body touch and movement sensations, it is contralateral."}, {"term": "Frontal Lobes", "definition": "Located just behind the forehead, it generally controls linguistic processing, higher-order thinking,and executive functioning, especially in the prefrontal cortex."}, {"term": "Prefrontal Cortex", "definition": "Located in the forward part of the frontal lobes, it is involved in high level cognitive functions such as: thinking, planning, decision-making, and impulse control."}, {"term": "Motor Cortex", "definition": "An area at the rear of the frontal lobes that initiates voluntary movements, it is contralateral meaning, the left hemisphere controls movement on the right side of the body."}, {"term": "Split Brain", "definition": "A condition resulting from surgery that isolates the brain’s two hemispheres by cutting the fibers (mainly those of the corpus callosum) connecting them."}, {"term": "Broca’s area", "definition": "An area in the left frontal lobe of the brain that is critical for the production of spoken language and directs the muscle movements involved in speech."}, {"term": "Wernicke’s area", "definition": "An area in the left temporal lobe involved in language comprehension and expression which controls language reception."}, {"term": "Aphasia", "definition": "Impairment of language, usually caused by left-hemisphere damage either to Broca's area (impairing speaking) or to Wernicke's area (impairing understanding)."}, {"term": "Plasticity", "definition": "The brain’s ability to change, especially during childhood, by reorganizing after damage or by building new pathways based on experience."}, {"term": "Electroencephalogram (EEG)", "definition": "A technique for measuring brain wave activity coming off the brain’s surface. EEG scans are used to identify issues such as epilepsy or sleeping disorders.f."}, {"term": "MRI (functional MRI)", "definition": "A technique for measuring brain activity in specific parts of the brain. fMRI scans show brain function as well as its structure."}, {"term": "Case Studies", "definition": "A descriptive technique in which an individual or group is studied in-depth over a long period of time."}, {"term": "Lesioning", "definition": "A surgical technique that removes parts of the brain to treat psychological or physical illnesses."}, {"term": "Consciousness", "definition": "Our awareness of ourselves and our environment."}, {"term": "Circadian rhythm", "definition": "The biological clock; regular bodily rhythms (for example, of temperature and wakefulness) that occur on a 24-hour cycle."}, {"term": "Jet lag", "definition": "Common sleep problems (like insomnia) and other symptoms you may experience after traveling a long distance quickly which disrupt our circadian rhythm."}, {"term": "Shift work", "definition": "Those who would have gone to bed at 9:00 p.m. are now up until 11:00 p.m. or later because of night work, this disrupts their circadian rhythm."}, {"term": "Stages of Sleep", "definition": "The stages of sleep are identified by their specific EEG patterns. NREM sleep occurs in Stages 1 through 3 and decreases in duration throughout the cycle."}, {"term": "REM sleep", "definition": "Rapid eye movement sleep; occurs after other NREM sleep stages have been cycled through, and increasing in duration throughout the cycle, this is when people have dreams."}, {"term": "Dreaming", "definition": "The sequence of images, emotions, and thoughts passing through a sleeping person’s mind. These are notable for their hallucinatory imagery, discontinuities, and incongruities, and for the dreamer’s delusional acceptance of the content and later difficulties remembering it."}, {"term": "REM rebound", "definition": "The tendency for REM sleep to increase following REM sleep deprivation (created by repeated awakenings during REM sleep)."}, {"term": "Activation-Synthesis Theory", "definition": "A theory that believes dreams are the brain's attempt to make sense of patterns of brain activity during REM sleep and REM helps preserve and develop neural connections."}, {"term": "Memory Consolidation Theory", "definition": "A theory which suggests that sleep is useful for restoring and building out memories of the day’s experiences through organizing and consolidating memories."}, {"term": "Memory Consolidation", "definition": "During deep sleep, the hippocampus processes memories for later retrieval. After a training experience, the greater the hippocampus activity during sleep, the better the next day’s memory will be."}, {"term": "The Restorative Theory", "definition": "A theory which suggests that sleep is useful for restoring depleted resources such as hormones, neurotransmitters and energy used throughout a given day."}, {"term": "Insomnia", "definition": "A sleep disorder in which people have recurring problems in falling or staying asleep."}, {"term": "Narcolepsy", "definition": "A sleep disorder characterized by uncontrollable sleep attacks. The sufferer may lapse directly into REM sleep, often at inopportune times."}, {"term": "REM sleep behavior disorder", "definition": "A sleep disorder in which you physically act out vivid, often unpleasant dreams with vocal sounds and sudden, often violent arm and leg movements during REM sleep."}, {"term": "Sleep apnea", "definition": "A sleep disorder that occurs when a person's airway collapses at night causing a halt in breathing, which leads to frequent waking, chronic fatigue, and loud snoring."}, {"term": "Somnambulism", "definition": "Also known as sleepwalking, a harmless sleep disorder in which people get up and walk around while asleep."}, {"term": "Sensation", "definition": "The process of detecting information from the environment that meets a certain threshold and transducing stimuli into neurochemical messages for processing in the brain."}, {"term": "Perception", "definition": "The process of organizing and interpreting sensory information, enabling us to recognize meaningful objects and events."}, {"term": "Absolute Threshold", "definition": "The minimum stimulation needed to detect a particular stimulus at least 50% of the time."}, {"term": "Just-noticeable Difference", "definition": "The minimum difference between two stimuli required for detection 50% of the time."}, {"term": "Weber’s Law", "definition": "The principle that, to be perceived as different, two stimuli must differ by a constant minimum percentage (rather than a constant amount)."}, {"term": "Sensory Interaction", "definition": "The process by which sensory systems work together to influence another. Example: When the smell of food influences its taste."}, {"term": "Synesthesia", "definition": "An experience of sensation in which one system of sensation is experienced through another."}, {"term": "Visual Sensory System", "definition": "Enables you to be aware of color, light level, contrast, motion and other visual stimuli. Example: If you “saw it” your visual system was responsible for that."}, {"term": "Retina", "definition": "The photosensitive surface at the back of the eye which cells capture visual information that is transduced to the brain for processing."}, {"term": "Blind Spot", "definition": "The point at which the visual nerve exits the eye, leading the brain to fill in the gaps in the incomplete retinal images to perceive a relatively complete picture of the world."}, {"term": "Accommodation", "definition": "The process by which the eye’s lens changes shape to focus near or far objects on the retina."}, {"term": "Nearsightedness", "definition": "When the point of focus is in front of the retina, making distant objects appear blurry."}, {"term": "Farsightedness", "definition": "When you can see distant objects clearly, however, objects nearby may be blurry."}, {"term": "Rods", "definition": "Cells that lie in the periphery of the eye and detect shapes and movement, but not color, they play a role in light and dark adaptation."}, {"term": "The Trichromatic Theory", "definition": "The theory that the retina contains three different color receptors—one most sensitive to red, one to green, one to blue—which, when stimulated in combination, can produce the perception of any color."}, {"term": "The Opponent-process Theory", "definition": "The theory that the activation of one type of receptor cell in a pair (red/green,black/white, blue/yellow) leads to the inhibition of the other, which leads to the experience of seeing afterimages."}, {"term": "Cones", "definition": "Photoreceptor cells located in the fovea of the eye that process color and detail."}, {"term": "Fovea", "definition": "The central focal point in the retina, around which the eye’s cones cluster."}, {"term": "Blue Cones", "definition": "The short wavelength detecting cones in the retina."}, {"term": "Green Cones", "definition": "The medium wavelength detecting cones in the retina."}, {"term": "Red Cones", "definition": "The long wavelength detecting cones in the retina."}, {"term": "Afterimages", "definition": "The lingering visual illusion in which retinal impressions persist after the removal of a stimulus, this is the result of certain ganglion cells in the retina being activated while others are not."}, {"term": "Ganglion Cells", "definition": "The axons of which converge to form the optic nerve."}, {"term": "Color Vision Deficiency", "definition": "The inability to distinguish certain shades of color which involves damage or irregularities to one or more cones or ganglion cells (red/green, blue/ yellow).DichromatismColor Vision Deficiency in which only two of the three primary colors can be discerned.MonochromatismComplete Color Vision Deficiency in which all colors appear as shades of one color."}, {"term": "Prosopagnosia", "definition": "Also known as face blindness, a disorder characterized by the inability to recognize the faces of familiar people."}, {"term": "Blindsight", "definition": "A disorder in which people respond to visual stimuli without consciously perceiving them."}, {"term": "Auditory Sensory System", "definition": "Processes how we hear and understand sounds within the environment."}, {"term": "Sound", "definition": "Occurs through the movement of air molecules at different wavelengths (called pitch) and amplitudes (called loudness)."}, {"term": "Pitch", "definition": "A tone’s experienced highness or lowness; depends on frequency."}, {"term": "Cochlea", "definition": "A coiled, bony, fluid-filled tube in the inner ear; sound waves traveling through the cochlear fluid trigger nerve impulses."}, {"term": "Place Theory", "definition": "In hearing, the theory that explains how individuals hear pitch. It suggests that specific frequencies are processed at specific places along the basilar membrane in the cochlea."}, {"term": "Volley Theory", "definition": "In hearing, the theory states that neural cells can alternate firing, and by firing in a rapid succession they can achieve a combined frequency above 1000 waves per second."}, {"term": "Frequency Theory", "definition": "In hearing, the theory that explains how humans hear different pitches. Vibrations along the basilar membrane trigger nerve impulses that are transmitted to the brain."}, {"term": "Sound Localization", "definition": "Our ability to identify where sounds in our environment are coming from."}, {"term": "Conduction Deafness", "definition": "Hearing loss caused by damage to the middle ear’s mechanical system that conducts sound waves to the cochlea."}, {"term": "Sensorineural Deafness", "definition": "Hearing loss caused by damage to the inner ear cochlea receptor cells or to the auditory nerves."}, {"term": "Olfactory Stimuli", "definition": "Stimuli relating to the sense of smell transduced and processed by structures in the nose and brain."}, {"term": "Smell", "definition": "The only sense not processed first in the thalamus of the brain."}, {"term": "Gustation", "definition": "The sense of taste, and types of tastes include sweet, sour, salty, bitter, umami, and oleogustus."}, {"term": "Umami", "definition": "The “delicious savory taste” in Japanese, its taste is often described as the meaty, savory deliciousness that deepens flavor."}, {"term": "Oleogustus", "definition": "The unique taste sensation that is attributed to the perception of fats or lipids in food."}, {"term": "Supertasters", "definition": "Someone who has a higher taste perception than the average."}, {"term": "Medium Tasters", "definition": "Someone who has an average ability to sense different flavors."}, {"term": "Nontasters", "definition": "Someone who has less taste perception than the average."}, {"term": "Sensory Receptors", "definition": "The structures within the skin and brain process and/or transduce touch stimuli. Example: The sensation of “hot” is produced by the activation of warm and cold receptors in the skin."}, {"term": "Pain", "definition": "The physical suffering or discomfort processed both in the body and in the brain."}, {"term": "Gate Control Theory", "definition": "The theory that the spinal cord contains a neurological “gate” that blocks pain signals or allows them to pass on to the brain, and the only way of reducing pain levels is through the application of a more pleasant sensation."}, {"term": "Phantom Limb Sensation", "definition": "When people who have lost limbs report sensation or pain where the limb used to be."}, {"term": "Vestibular Sense", "definition": "The sense of the body movements and position, it controls balance and is primarily detected by the semicircular canals and structures in the brain."}, {"term": "Kinesthesis", "definition": "The sense of one’s body movement which allows one to be able to tell exact body position without looking at the body."}, {"term": "Top-Down Processing", "definition": "Information processing guided by higher-level mental processes, as when we construct perceptions relying on internal prior expectation."}, {"term": "Schema", "definition": "A concept or framework that organizes and interprets information."}, {"term": "Perceptual Set", "definition": "A mental predisposition to perceive one thing and not another."}, {"term": "Context Effect", "definition": "The principle that the environmental factors, (the context) that surround an event governs how it is perceived or remembered."}, {"term": "Closure", "definition": "The tendency for individuals to perceive incomplete or fragmented patterns as complete and whole. It is when our brain fills in the missing information to create a complete image or concept."}, {"term": "Figure-Ground Relationship", "definition": "The organization of the visual field into objects (the figures) that stand out from their surroundings (the ground)."}, {"term": "Similarity", "definition": "The principle that we group objects according to how similar they are to each other."}, {"term": "Attention", "definition": "An interaction of sensation and perception that is affected by internal and external processes."}, {"term": "Selective Attention", "definition": "Focusing conscious awareness on a particular stimulus."}, {"term": "Cocktail Party Effect", "definition": "The ability to attend to the mentions of an individual’s name or specific topics in a loud or distracting environment."}, {"term": "Change Blindness", "definition": "A form of inattentional blindness in which we fail to notice changes in aspects of the environment."}, {"term": "Binocular Cues", "definition": "A depth cue, such as retinal disparity, that depends on the use of two eyes."}, {"term": "Retinal Disparity", "definition": "A binocular cue for perceiving depth. By comparing retinal images from the two eyes, the brain calculates distance - the greater the difference between the images projected onto the retina, the closer the object."}, {"term": "Convergence", "definition": "A cue to nearby objects’ distance which merges the retinal images by the brain."}, {"term": "Monocular Cues", "definition": "A depth cue available to either eye alone which gives the illusion of depth on flat or two-dimensional surfaces."}, {"term": "Relative Size", "definition": "Objects are similar in size, we perceive the one that casts a smaller retinal image to be farther away."}, {"term": "Texture Gradient", "definition": "Moving toward or away from an object changes our perception of its smoothness or texture. From a distance, a wall appears smooth, while closer inspection reveals greater texture and detail."}, {"term": "Linear Perspective", "definition": "Parallel lines appear to meet in the distance. The sharper the angle of convergence, the greater the perceived distance is."}, {"term": "Interposition", "definition": "If one object partially blocks our view of another, we perceive it as closer."}, {"term": "Perceptual Constancy", "definition": "Maintaining the perception of an object even when the retinal images and illumination of the object in the visual field change."}, {"term": "Concepts", "definition": "A mental grouping of similar objects, events, ideas, or people which form the basis of thought."}, {"term": "Prototypes", "definition": "The ideal example for any given concept. It is a mental image used for quickly sorting items into categories."}, {"term": "Schemas", "definition": "Frameworks for thinking that organizes and interprets information."}, {"term": "Assimilation", "definition": "Interpreting our new experiences in terms of our existing schemas. This does not change the schema."}, {"term": "Algorithms", "definition": "The step-by-step procedure for solving a particular problem which addresses problems by attempting all possible solutions until the correct one is found."}, {"term": "Heuristics", "definition": "A simple thinking strategy which addresses problems by using mental shortcuts to make judgments. However, it could lead to errors in judgment."}, {"term": "Representative Heuristic", "definition": "A problem-solving shortcut that leads to judgment errors when decisions are based on expectations or stereotypes."}, {"term": "Availability Heuristic", "definition": "A problem-solving shortcut that occurs when we think that events that easily pop into our mind occur more frequently."}, {"term": "Mental Set", "definition": "A tendency to approach a problem in one particular way influenced by prior experiences that were successful."}, {"term": "Priming", "definition": "When exposure to one stimulus influences how people respond to a later stimulus."}, {"term": "Framing", "definition": "The way an issue is framed, this can significantly affect decisions and judgments."}, {"term": "Gambler’s Fallacy", "definition": "The tendency to believe that when random events happen repeatedly they will most likely not occur again, despite none of the odds changing."}, {"term": "Sunk-Cost Fallacy", "definition": "The tendency to continue pursuing a plan in which you've already invested money, time, or resources even when switching to a new approach could save us time."}, {"term": "Executive Function", "definition": "Cognitive processes that allow individuals to generate, organize, plan, and carry out goal-directed behaviors and experience critical thinking."}, {"term": "Creativity", "definition": "A way of thinking which allows one to produce new and valuable ideas.Divergent ThinkingExpanding the number of possible problem solutions; creative thinking that diverges in different directions.Convergent ThinkingNarrowing the available problem solutions to determine the single best solution."}, {"term": "Functional Fixedness", "definition": "A cognitive bias which limits an individual's ability to use an object in more ways than it is traditionally used."}, {"term": "Memory", "definition": "The persistence of learned knowledge, events, and experiences; they are differentiated by how they are processed, stored in, and retrieved by the brain."}, {"term": "Explicit Memory", "definition": "A type of memory that is the retention of facts and experiences that we can consciously know and “declare.”Episodic MemoryA type of explicit memory of personally experienced events."}, {"term": "Semantic Memory", "definition": "A type of explicit memory of facts and general knowledge."}, {"term": "Implicit Memory", "definition": "A type of memory that is the retention of learned skills or classically conditioned associations independent of conscious recollection."}, {"term": "Procedural Memory", "definition": "A type of implicit memory for procedures and processes."}, {"term": "Prospective Memory", "definition": "A type of memory related to future actions."}, {"term": "Long-Term Potentiation", "definition": "A biological process for memory by which synaptic connections between neurons become stronger with frequent activation."}, {"term": "The Working Memory Model", "definition": "Examines how our primary memory system—working memory— engages in a dynamic interaction with several components, namely the central executive, phonological loop, and visuospatial sketchpad, to process information into long-term memory."}, {"term": "Central Executive", "definition": "A memory component that coordinates the activities of the phonological loop and visuospatial sketchpad."}, {"term": "Phonological Loop", "definition": "A memory component that briefly holds auditory information."}, {"term": "Visuospatial Sketchpad", "definition": "A memory component that briefly holds information about objects’ appearance and location in space."}, {"term": "The Multi-Store Model", "definition": "Proposes three interacting systems (sensory memory [including iconic and echoic memory], short-term memory, and long-term memory) that information must pass through to be remembered. This model focuses on the impact of automatic and effortful processing on memory encoding, storage, and retrieval."}, {"term": "Sensory Memory", "definition": "The quick recording of sensory information in the memory system."}, {"term": "Iconic Memory", "definition": "A momentary sensory memory of visual stimuli lasting no more than a few tenths of a second."}, {"term": "Echoic Memory", "definition": "A momentary sensory memory of auditory stimuli, if distracted, sounds and words can still be recalled within 3 or 4 seconds."}, {"term": "Long-Term Memory", "definition": "The permanent and endless archive of the memory system which includes knowledge, skills, and experiences.Automatic Processing."}, {"term": "Encoding", "definition": "The process of getting information into the memory system. How information is encoded can determine how effectively information is stored and retrieved."}, {"term": "Storage", "definition": "The process of retaining encoded information over a period of time."}, {"term": "Retrieval", "definition": "The process of getting information out of memory storage."}, {"term": "Levels of Processing Model", "definition": "Proposes that memory is encoded on three levels from shallowest to deepest: structural, phonemic, and semantic.Shallow Processing."}, {"term": "Method of Loci", "definition": "A mnemonic device, in which an individual associates information with a specific location in a familiar setting to enhance recall."}, {"term": "Chunking", "definition": "The process of grouping information together into meaningful chunks, categories, or hierarchies."}, {"term": "Spacing Effect", "definition": "The tendency for distributed practice to yield better long-term retention than through massed practice."}, {"term": "Massed Practice", "definition": "When information is encoded all at once it tends to yield a false sense of understanding."}, {"term": "Distributed Practice", "definition": "When information is distributed over time it tends to yield a better sense of understanding."}, {"term": "Primacy Effect", "definition": "The tendency for information presented at the beginning of a list to be more memorable."}, {"term": "Recency Effect", "definition": "The tendency for information presented at the end of a list to be more memorable."}, {"term": "Working Memory", "definition": "The effortful processing of incoming sensory information, and information retrieved from long-term memory."}, {"term": "Maintenance Rehearsal", "definition": "Prolonged memory storage through rehearsing information over time.Elaborative RehearsalRehearsing information over time in ways that promote meaning."}, {"term": "Highly Superior Autobiographical Memory", "definition": "An incredibly accurate memory of an individual life’s events which may indicate that there are biological processes for superior memory storage."}, {"term": "Autobiographical Memory", "definition": "The memories connected to our own lives or selves that are more memorable."}, {"term": "Amnesia", "definition": "A partial or permanent loss of memory."}, {"term": "Retrograde Amnesia", "definition": "An inability to remember information from one’s past."}, {"term": "Anterograde Amnesia", "definition": "An inability to form new memories."}, {"term": "Alzheimer’s Disease", "definition": "A brain disorder that impairs memory and thinking skills, and eventually disrupts the retrieval of both new and old memories."}, {"term": "Infantile Amnesia", "definition": "An inability in adults to remember episodic memories from their early years of life."}, {"term": "Recall", "definition": "A measure of memory in which an individual must retrieve information learned earlier by remembering without cues."}, {"term": "Recognition", "definition": "A measure of memory in which an individual identifies items previously learned which relies on retrieval cues."}, {"term": "Context-Dependent Memory", "definition": "The tendency for the process of memory retrieval to be enhanced when individuals are in the same environmental space or context in which the memories were originally formed."}, {"term": "Mood-Congruent Memory", "definition": "The tendency for the process of memory retrieval to be enhanced when individuals are currently in the same good or bad mood."}, {"term": "State-Dependent Memory", "definition": "The tendency for the process of memory retrieval to be enhanced when individuals are in the same physical state in which the memories were originally formed."}, {"term": "Testing Effect", "definition": "A retrieval practice process which allows for enhanced memory after retrieving, rather than simply rereading information."}, {"term": "Metacognition", "definition": "A retrieval practice process which involves keeping track of and evaluating our mental processes; thinking about our thinking."}, {"term": "Forgetting Curve", "definition": "Demonstrates that time is a significant factor in forgetting and forgetting occurs rapidly after initial learning and levels off over time."}, {"term": "Encoding Failure", "definition": "When information is not efficiently transferred and stored in the memory system during the encoding stage; when new information that is not attended to is not stored in memory."}, {"term": "Proactive Interference", "definition": "The inability to recall new information due to old information disrupting."}, {"term": "Retroactive Interference", "definition": "The inability to recall old information due to new information disrupting."}, {"term": "Inadequate Retrieval", "definition": "A situation when the information is in long-term memory but difficult to access; there are not enough triggers to retrieve a memory."}, {"term": "Tip-of the-tongue Phenomenon", "definition": "The temporary inability to remember a particular item, accompanied by a feeling that it's just out of reach."}, {"term": "Psychodynamics", "definition": "Theories that view personality with a focus on the unconscious mind and the importance of childhood experiences."}, {"term": "Repression", "definition": "The ego defense mechanism that banishes distressing thoughts, feelings, and memories from consciousness."}, {"term": "Misinformation Effect", "definition": "Occurs when an individual incorporates misleading information into their memory of an event."}, {"term": "Source Amnesia", "definition": "The inability to remember when, why, or where certain information was previously learned."}, {"term": "Constructive Memory", "definition": "Because memory is imperfect, individuals fill in the gaps with information that seems to fit the context."}, {"term": "Imagination Inflation", "definition": "A memory distortion in which vividly imagining an event increases confidence that the event actually occurred."}, {"term": "Intelligence", "definition": "The ability to learn from experience to solve problems and use knowledge to adapt to new situations."}, {"term": "Intelligence Test", "definition": "A test designed to measure the ability to think and reason that yields an intelligence quotient (IQ), which divides mental age by chronological age."}, {"term": "General Ability (g)", "definition": "Hypothetical factor that underlies all mental abilities and is therefore measured by every task on an intelligence test."}, {"term": "Intelligence Quotient (IQ)", "definition": "The ratio of mental age to chronological age multiplied by 100, (Mental Age/Chronological Age) x x 100 = IQ. In modern times, IQ scores are often used to identify students for educational services."}, {"term": "Psychometrics", "definition": "The scientific study of the measurement of human abilities, attitudes and traits. All psychological assessments, including intelligence tests, should adhere to sound psychometric principles to be considered useful.StandardizationDefining uniform testing procedures and meaningful scores by comparison with the perforation of a pretested group. A test is said to be standardized when it is administered using procedures and environments."}, {"term": "Validity", "definition": "The extent to which a test measures or predicts what it is designed to."}, {"term": "Construct Validity", "definition": "The extent to which there a test measures a concept or trait is was designed to."}, {"term": "Predictive Validity", "definition": "The success with which a test predicts the behavior it is designed to predict; it is assessed by computing the correlation between test scores and the standard behavior."}, {"term": "Reliability", "definition": "The extent to which a test yields consistent results, as assessed by the consistency of scores on two halves of the test, on alternate forms of the test, or on retesting."}, {"term": "Test-Retest Reliability", "definition": "A method for determining the reliability of a test by comparing a test taker's scores on the same test taken on separate occasions."}, {"term": "Split-Half Reliability", "definition": "A measure of reliability in which a test is split into two halves and an individual's scores on both halves are compared."}, {"term": "Stereotype Threat", "definition": "A self-confirming concern that one will be evaluated based on a negative stereotype."}, {"term": "Stereotype Lift", "definition": "An improved performance as a result of being confident that your group or “type” does well on a particular task."}, {"term": "Flynn Effect", "definition": "The rise in IQ scores that has occurred over time across much of the world due to societal factors, such as higher socioeconomic status and access to better health care and better nutrition."}, {"term": "Achievement Test", "definition": "A test designed to assess what a person has learned."}, {"term": "Aptitude Test", "definition": "A test designed to predict a person's future capacity to learn or performance."}, {"term": "Fixed Mindset", "definition": "The view that intelligence and talents are unchangeable (fixed) from birth, even with effort."}, {"term": "Growth Mindset", "definition": "The view that intelligence and talents are malleable, meaning they can be improved through learning."}, {"term": "Developmental Psychology", "definition": "The study of human growth and development across the lifespan. This includes physical, cognitive, emotional, and social changes from birth to old age."}, {"term": "Stability and Change", "definition": "Studies if personalities and behaviors stay consistent throughout our lives (stability) or do they change over time (change)?"}, {"term": "Nature and Nurture", "definition": "Both nature and nurture both matter to human development. Developmental psychologists are interested in the enduring effects of genetics and environmental factors that interact and contribute to development."}, {"term": "Continuous and Discontinuous Stages", "definition": "Model that people go through distinct and separate phases of development and follow a specific order from one stage to the next."}, {"term": "Cross-Sectional Research", "definition": "A study in which people of different ages are compared with one another."}, {"term": "Longitudinal Research", "definition": "A study in which the same people are studied over a longer period of time."}, {"term": "Teratogens", "definition": "Agents, such as viruses and drugs, that can cause birth defects or developmental abnormalities in a developing embryo or fetus when it is exposed to it during pregnancy."}, {"term": "Fine Motor Skills", "definition": "Coordination of small actions."}, {"term": "Gross Motor Skills", "definition": "Coordination of larger movements."}, {"term": "Infant Reflexes", "definition": "Involuntary movements in response to stimulation: Stepping, Sucking, Rooting, Grasping, etc."}, {"term": "Rooting Reflex", "definition": "An automatic response seen in newborn babies, who turn their face towards the stimulus and make sucking motions with the mouth."}, {"term": "Imprinting", "definition": "A form of learning in which a very young animal fixes its attention on and follows the first object, person, or animal with which it has visual, auditory, or tactile experience."}, {"term": "Sensitive Period", "definition": "Period of time during which an organism is most sensitive to environmental stimuli and in which learning most easily takes place before a narrowing of learning ability."}, {"term": "Critical Period Hypothesis", "definition": "Suggests that there is a specific window of time during which humans are most adept at learning languages. It is typically thought to end around the time of puberty."}, {"term": "Adolescence", "definition": "Period that begins with puberty and ends with transition into adulthood."}, {"term": "Puberty", "definition": "Period of rapid growth and sexual maturation.Girls typically begin puberty around the age of 10. Boys typically begin puberty 2 years later. Marked by a physical growth spurt and changes - including the development of primary and secondary sex characteristics."}, {"term": "Primary Sex Characteristics", "definition": "Changes in the reproductive organs. For males, this includes the growth of the testes, penis, scrotum and spermarche. For females, this includes the growth of the uterus and menarche."}, {"term": "Secondary Sex Characteristics", "definition": "Physical changes not directly linked to reproduction but signal sexual maturity. For males, this includes broader shoulders, a lower voice, the growth of darker and coarser facial and body hair. For females, this includes the broadening of hips and the growth of darker and coarser body hair."}, {"term": "Menarche", "definition": "The first menstrual period a female experiences."}, {"term": "Spermarche", "definition": "The first ejaculation a male experiences."}, {"term": "Menopause", "definition": "The time of natural cessation of menstruation; also refers to the biological changes a woman experiences as her ability to reproduce declines."}, {"term": "Sex", "definition": "Determined chromosomally and through physical characteristics."}, {"term": "Sexual Orientation", "definition": "A person's identity in relation to the gender or genders to which they are sexually attracted, developed by a combination of genetics, prenatal hormones, and social influences."}, {"term": "Continuity", "definition": "Describes development involving gradual changes in behaviors and thought processes."}, {"term": "Discontinuity", "definition": "Describes development involving distinct shifts in behaviors and thought processes."}, {"term": "Sensorimotor Stage", "definition": "During this stage, children demonstrate the development of object permanence and think via movement and stimulation of the senses."}, {"term": "Object Permanence", "definition": "The understanding that items continue to exist even when not sensed directly."}, {"term": "Preoperational Stage", "definition": "Children exhibit the highest levels of egocentrism during the preoperational stage, where it is difficult for them to perform the mental operations necessary to understand another’s perspective."}, {"term": "Conservation", "definition": "The recognition that an object maintains its volume regardless of shape."}, {"term": "Reversibility", "definition": "The ability to undo a sequence of events back to its original starting point."}, {"term": "Animism", "definition": "When children believe that inanimate objects have lifelike qualities."}, {"term": "Egocentrism", "definition": "The inability to take another’s point of view."}, {"term": "Theory of Mind", "definition": "The ability to understand that others have different beliefs, wishes, emotions, and perceptions that influence their behavior."}, {"term": "Concrete Operational Stage", "definition": "During this stage, children can think logically about concrete events and understand conservation."}, {"term": "Formal Operational Stage", "definition": "During this stage, individuals can think abstractly and hypothetically."}, {"term": "Scaffolding", "definition": "The process in which the more knowledgeable other provides support or mentorship to a learner to help them achieve a new skill."}, {"term": "Zone of Proximal Development", "definition": "The principle expresses moving from what one already knows to what is just beyond their knowledge base (ZPD), to what students won’t be able to grasp even with the help of others."}, {"term": "Crystallized Intelligence", "definition": "The aspect of general intelligence (g), consisting of the knowledge, facts, information, and verbal skills acquired throughout life."}, {"term": "Fluid Intelligence", "definition": "The aspect of general intelligence (g), consisting of the capacity to reason quickly and abstractly."}, {"term": "Dementia", "definition": "A progressive brain disease that involves memory loss, cognitive decline, neural death, and changes in behavior."}, {"term": "Language", "definition": "A shared system of arbitrary symbols that are rule-governed and generative to produce an infinity of ideas."}, {"term": "Phonemes", "definition": "The smallest individual sounds in any language. Dog: /d/ /o/ /g/MorphemesThe smallest units of meaning in a language (e.g., root words, prefixes, suffixes)."}, {"term": "Semantics", "definition": "The component of language that provides both the meaning of words and how words combine to form meaning. \"They saw her duck.\"GrammarA system of rules that enables us to communicate with and understand others."}, {"term": "Syntax", "definition": "The aspect of grammar that refers to the rules used to put words in the correct order in a sentence."}, {"term": "Cooing", "definition": "Involves the soft vowel-like sounds produced by babies when they appear to be happy or content such as \"oo,\" \"ah,\" and \"ee.\"BabblingInvolves consonant-like sounds and begins around six months before a child can speak words such as \"ma-ma\" or \"da-da\"."}, {"term": "One-Word Stage", "definition": "When children communicate using single words that often convey complex ideas. This is typical from 10-18 months."}, {"term": "Telegraphic Speech", "definition": "Involves the first multi-word speech consisting of two or three-word expressions typical from 18-30 months."}, {"term": "Overgeneralization", "definition": "A characteristic error when learning a language in which individuals apply grammatical rules too broadly."}, {"term": "Ecological Systems Theory", "definition": "Explores how the social environment influences development. The five systems in this theory include: Microsystem, Mesosystem, Exosystem, Macrosystem and Chronosystem."}, {"term": "Microsystem", "definition": "Groups that have direct contact with the individual such as family, friends and the immediate environment."}, {"term": "Mesosystem", "definition": "The relationships between groups in the microsystem such as how family and friends get along."}, {"term": "Exosystem", "definition": "Indirect factors in an individual’s life such as events in the community or parent's workplace."}, {"term": "Macrosystem", "definition": "Cultural and societal events that affect the individuals and others around them such as growing up in urban or rural areas."}, {"term": "Chronosystem", "definition": "The individual’s current stage of life."}, {"term": "Authoritarian", "definition": "A parenting style of caregivers in which they are coercive, imposing rules and expecting obedience."}, {"term": "Authoritative", "definition": "A parenting style of caregivers in which they are confrontive. They are both demanding and responsive. They exert control by setting rules, but, especially with older children, they encourage open discussion and allow exceptions."}, {"term": "Permissive", "definition": "A parenting style of caregivers in which they are unrestraining. They make few demands, set few limits, and use little punishment."}, {"term": "Secure Attachment", "definition": "Children have trusting relationships with caregivers allowing them to explore and return to the caregiver for comfort when necessary. This relationship often carries over into adulthood."}, {"term": "Anxiously Attachment", "definition": "Children are clingy and nervous but also may show aggression."}, {"term": "Avoidant Attachment", "definition": "Children seem detached overall, with little distress at being separated."}, {"term": "Disorganized Attachment", "definition": "Children show inconsistency, sometimes showing fear, affection, anger, or even just freezing in place and staring into space."}, {"term": "Temperament", "definition": "A person’s characteristic emotional reactivity and intensity which is related to how children attach to caregivers."}, {"term": "Separation Anxiety", "definition": "The normal distress that a young child experiences when away from the caregiver to whom they are attached."}, {"term": "Contact Comfort", "definition": "A researcher found that when infant monkeys were startled or frightened, they preferred a cloth surrogate mother over a wire mother who had food. The baby monkeys’ response indicated contact comfort was more important to them than food."}, {"term": "Parallel Play", "definition": "When children engage with peers by playing near each other but not together."}, {"term": "Pretend Play", "definition": "When children engage with peers by making up and acting out scenarios."}, {"term": "Imaginary Audience", "definition": "When adolescents believe that everyone is always watching them, noticing their failures, this leads to stress and humiliation."}, {"term": "Personal Fable", "definition": "An exaggerated sense of being special and unique."}, {"term": "Social Clock", "definition": "The culturally preferred timing of major life events such as marriage, parenthood, and retirement."}, {"term": "The Psychosocial Theory of Development", "definition": "Proposes that different life stages present different psychosocial conflicts that require resolution in order to move healthily to the next stage in our lifespan."}, {"term": "Trust and mistrust", "definition": "The psychosocial stage of development in which the conflict involves learning to trust the caregiver."}, {"term": "Autonomy and Shame and Doubt", "definition": "The psychosocial stage of development in which the conflict involves making one's own decisions and gaining independence."}, {"term": "Initiative and Guilt", "definition": "The psychosocial stage of development in which the conflict involves children asserting their power and control in the world, often through taking initiative."}, {"term": "Industry and Inferiority", "definition": "The psychosocial stage of development in which children focus on the ability to develop a sense of competence through productive activities like social interactions."}, {"term": "Identity and Role Confusion", "definition": "The psychosocial stage of development in which individuals try to figure out who they are and who they want to become."}, {"term": "Intimacy and Isolation", "definition": "The psychosocial stage of development in which individuals in early adulthood often seek a life partner with whom they will share their most closely held secrets and hopes."}, {"term": "Generativity and Stagnation", "definition": "The psychosocial stage of development in which the conflict involves feeling satisfied and productive with your career, family, and the ways that you make the world a better place."}, {"term": "Integrity and Despair", "definition": "The psychosocial stage of development in which the conflict is reflective, adults evaluate their choices and decide if they are satisfied with how they have lived or experience regret."}, {"term": "Aversive Childhood Experiences (ACEs)", "definition": "Events that occur during childhood which act as a source of stress that affects an individual and the relationships they form throughout their lifespan."}, {"term": "Achievement", "definition": "A committed sense of self, and a desire to accomplish something personally meaningful that contributes to the world beyond oneself."}, {"term": "Diffusion", "definition": "When a person is without a clear commitment to a particular identity and perhaps with little sense of who they are."}, {"term": "Foreclosure", "definition": "When a person commits to a profession without even exploring other options the person is considered identity foreclosed."}, {"term": "Moratorium", "definition": "When a person is actively exploring their identity."}, {"term": "Classical Conditioning", "definition": "Focuses on the association of one stimulus with another stimulus to elicit a response. Learning the association (acquisition) involves a series of steps that demonstrate principles of associative learning."}, {"term": "Acquisition", "definition": "The initial stage, when one links a neutral stimulus and an unconditioned stimulus so that the neutral stimulus begins triggering the conditioned response."}, {"term": "Associative Learning", "definition": "Learning that certain events occur together, typically two stimuli."}, {"term": "Unconditioned Stimulus (UCS)", "definition": "A stimulus that unconditionally and naturally triggers an unconditioned response (UCR)."}, {"term": "Unconditioned Response (UCR)", "definition": "An unlearned, naturally occurring response (such as salivation) to an unconditioned stimulus (UCS) (such as food)."}, {"term": "Conditioned Stimulus (CS)", "definition": "An originally neutral stimulus that, after association with an unconditioned stimulus (UCS), begins to trigger a conditioned response (CR)."}, {"term": "Conditioned Response (CR)", "definition": "A learned response to a previously neutral (but now conditioned) stimulus (CS)."}, {"term": "Extinction", "definition": "The diminishing of a conditioned response (CR) when an unconditioned stimulus (UCS) is no longer paired with a conditioned stimulus (CS)."}, {"term": "Spontaneous Recovery", "definition": "The reappearance of a formerly extinct conditioned response (CR) after the conditioned stimulus (CS) and unconditioned stimulus (UCS) are paired together again."}, {"term": "Stimulus Discrimination", "definition": "The learned ability to distinguish between a conditioned stimulus (CS) and other stimuli that have not been associated with a conditioned stimulus."}, {"term": "Stimulus Generalization", "definition": "The tendency, once a response has been conditioned, for stimuli similar to the conditioned stimulus to elicit similar responses."}, {"term": "Higher-Order Conditioning", "definition": "When the conditioned stimulus (CS) in one conditioning experience is paired with a new stimulus, creating a second conditioned stimulus."}, {"term": "Counterconditioning", "definition": "A behavior therapy procedure that uses classical conditioning to evoke new emotional responses to stimuli that are triggering unwanted behaviors."}, {"term": "Taste Aversion", "definition": "A learned aversion to a specific taste or food, developed through classical conditioning, after a negative experience such as nausea or illness, even if the food wasn't the real cause."}, {"term": "Biological Preparedness", "definition": "How animals are biologically predispos
