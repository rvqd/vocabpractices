<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Server</title>

    <style>
        @font-face {
            font-family: 'OCRA';
            src: url('ocraextended.ttf') format('truetype');
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            color: white;
            font-family: 'OCRA', monospace;
            overflow: hidden;
        }

        /* Star background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                radial-gradient(2px 2px at 20% 30%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 70% 80%, #ffffff, transparent),
                radial-gradient(1px 1px at 40% 60%, #ffffff, transparent),
                radial-gradient(2px 2px at 90% 10%, #ffffff, transparent),
                radial-gradient(1px 1px at 10% 90%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 60% 40%, #ffffff, transparent);
            background-repeat: repeat;
            animation: moveStars 60s linear infinite;
            opacity: 0.4;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 520px;
            padding: 30px;
            text-align: center;
        }

        ol {
            text-align: left;
            line-height: 1.7;
            margin-bottom: 35px;
            opacity: 0.9;
            font-size: 1.05rem;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            background: #a0c19d;
            color: #111;
            cursor: pointer;
            font-family: 'OCRA', monospace;
            transition: 0.25s;
            box-shadow: 0 0 10px rgba(160, 193, 157, 0.5);
            margin-bottom: 20px;
        }

        button:hover {
            background: #8fb38c;
            box-shadow: 0 0 15px rgba(160, 193, 157, 0.7);
        }

        .preview {
            margin-top: 15px;
            padding: 18px;
            background: #111;
            border-radius: 8px;
            font-size: 0.92rem;
            word-break: break-all;
            text-align: left;
            border: 1px solid #333;
            display: none;
            opacity: 0.9;
        }

        .copied {
            margin-top: 10px;
            color: #a0c19d;
            font-size: 0.95rem;
            opacity: 0;
            transition: opacity 0.4s;
        }
    </style>
</head>

<body>

<div class="container">
    <ol>
        <li>Click the button below</li>
        <li>Roblox.com will open in a new tab</li>
        <li>Press <strong>F12</strong> (or Ctrl + Shift + I)</li>
        <li>Go to the <strong>Console</strong> tab</li>
        <li>The command is already copied — just paste and press Enter</li>
    </ol>

    <button onclick="copyAndShowCommand()">Copy Join Command & Open Roblox</button>

    <div id="previewBox" class="preview"></div>
    <div id="copiedMsg" class="copied">✅ Command copied to clipboard!</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const placeId = params.get('placeId');
    const jobId = params.get('jobId');

    function copyAndShowCommand() {
        if (!placeId || !jobId) {
            alert("Missing Place ID or Job ID");
            return;
        }

        const command = `Roblox.GameLauncher.joinGameInstance(${placeId}, "${jobId}");`;

        // Copy to clipboard
        navigator.clipboard.writeText(command).then(() => {
            // Show preview
            const previewBox = document.getElementById('previewBox');
            previewBox.style.display = 'block';
            previewBox.textContent = command;

            // Show copied message
            const copiedMsg = document.getElementById('copiedMsg');
            copiedMsg.style.opacity = '1';

            // Auto-hide message after 3 seconds
            setTimeout(() => {
                copiedMsg.style.opacity = '0';
            }, 3000);

        }).catch(() => {
            alert("Failed to copy. Please copy manually:\n" + command);
        });

        // Open Roblox in new tab
        window.open('https://www.roblox.com/home', '_blank');
    }

    // Optional: Auto-trigger after 800ms so the user doesn't even need to click
    window.onload = () => {
        setTimeout(() => {
            if (placeId && jobId) {
                copyAndShowCommand();
            }
        }, 800);
    };
</script>

</body>
</html>
