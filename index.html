ed to learning certain stimulus-response pairings more quickly than others."}, {"term": "One-Trial Learning", "definition": "Learning which occurs when the association is acquired through one pairing of the stimulus and response and is not strengthened by further pairings."}, {"term": "Habituation", "definition": "When an organism grows accustomed to and exhibits a diminished response to a repeated or enduring stimulus."}, {"term": "Operant Conditioning", "definition": "A type of learning which focuses on associating consequences (reinforcement and punishment) with behaviors."}, {"term": "The Law of Effect", "definition": "States that behaviors with reinforcing consequences are more likely to be repeated while behaviors with punishing consequences are not as likely to be repeated."}, {"term": "Reinforcement", "definition": "In operant conditioning, any event that strengthens the behavior it follows."}, {"term": "Positive Reinforcement", "definition": "Increasing behavior by adding a desirable stimulus. When presented with the stimulus after a response, the response is strengthened."}, {"term": "Negative Reinforcement", "definition": "Increasing behavior by taking away a desirable stimulus. When removed after a response, the response is strengthened."}, {"term": "Punishment", "definition": "In operant conditioning, any event that decreases the behavior it follows."}, {"term": "Positive Punishment", "definition": "Decreasing behavior by adding an unpleasant stimulus. When presented with the stimulus after a response, it decreases the response."}, {"term": "Negative Punishment", "definition": "Decreasing behavior by taking away a desirable stimulus. When removed after a response, the response is decreased."}, {"term": "Primary Reinforcer", "definition": "A naturally reinforcing stimulus, such as one that satisfies a biological need."}, {"term": "Secondary Reinforcer", "definition": "A stimulus that gains its reinforcing power through association with a primary reinforcer."}, {"term": "Reinforcement Discrimination", "definition": "In operant conditioning, the ability to distinguish responses that are reinforced from similar responses that are not reinforced."}, {"term": "Reinforcement Generalization", "definition": "In operant conditioning, when responses learned in one situation occur in other, similar situations."}, {"term": "Shaping", "definition": "In operant conditioning, the procedure in which reinforcement shapes behavior through gradually rewarding successive approximations of the desired behavior."}, {"term": "Successive Approximations", "definition": "A technique where behaviors that are progressively closer to a desired target behavior are rewarded."}, {"term": "Instinctive Drift", "definition": "The tendency of an animal's reinforced behavior to gradually become replaced by an innate or instinctive behavior. This demonstrates only certain behaviors can be shaped through reinforcement."}, {"term": "Superstitious Behaviors", "definition": "Occurs when consequences reinforce unrelated behaviors."}, {"term": "Learned Helplessness", "definition": "Occurs when organisms learn that they have no control over their experience of aversive consequences in a given situation."}, {"term": "Reinforcement Schedules", "definition": "The schedule with which reinforcement is delivered can determine the strength of the association between the consequence and the response. The two main types of reinforcement schedules are continuous and partial. Each type of reinforcement behavior can be graphed, resulting in a distinctive pattern on the graph(e.g.,fixed-interval schedule produces a scalloped graph)."}, {"term": "Continuous Reinforcement", "definition": "Rewarding or delivering a reinforcement for each and every correct behavior."}, {"term": "Partial Reinforcement", "definition": "Focuses on whether reinforcement is delivered on a time-based schedule or for the number of behaviors performed."}, {"term": "Fixed-Interval", "definition": "A reinforcement schedule that reinforces a response only after a specified time has elapsed."}, {"term": "Variable-Interval", "definition": "A reinforcement schedule that reinforces a response at unpredictable time intervals."}, {"term": "Fixed-Ratio", "definition": "A reinforcement schedule that reinforces a response only after a specified number of responses."}, {"term": "Variable-Ratio", "definition": "A reinforcement schedule that reinforces a response after an unpredictable number of responses."}, {"term": "Social Learning Theory", "definition": "Proposes that learning can occur by observation and does not have to involve personal experience with a consequence (vicarious conditioning)."}, {"term": "Vicarious Conditioning (Observational Learning)", "definition": "The process of learning by observing others and others' experiences."}, {"term": "Modeling", "definition": "Learning that can occur by copying the behavior of models. The more similar a model is, the more likely the behavior is to be learned."}, {"term": "Insight Learning", "definition": "Occurs when the solution to a problem occurs without any association, consequence, or model being present."}, {"term": "Latent Learning", "definition": "Occurs when information is learned without reinforcement but is not immediately evident. Latent learning is often demonstrated by cognitive maps."}, {"term": "Cognitive Map", "definition": "A mental layout of one’s environment acquired through experience."}, {"term": "Attribution Theory", "definition": "The theory that we explain someone’s behavior by crediting either the situation (a situational attribution) or the person’s stable, enduring traits (a dispositional attribution)."}, {"term": "Dispositional Attribution", "definition": "The theory that we explain someone’s behavior by crediting the person’s stable, enduring traits such as personality."}, {"term": "Situational Attribution", "definition": "The theory that we explain someone’s behavior by crediting the situation."}, {"term": "Explanatory Style", "definition": "A predictable pattern of attributions which interpret good and bad events in ways that are pessimistic or optimistic."}, {"term": "Optimism Explanatory Style", "definition": "The tendency to see the best aspect of things or believe the best will happen; hopeful and confident about the future."}, {"term": "Pessimism Explanatory Style", "definition": "The tendency to see the worst aspect of things or believe that the worst will happen; a lack of hope or confidence in the future."}, {"term": "Actor-Observer Bias", "definition": "The tendency for those acting in a situation to attribute their behavior to external causes, but for observers to attribute others’ behavior to internal causes."}, {"term": "Fundamental Attribution Error", "definition": "The tendency for observers, when analyzing others’ behavior, to underestimate the impact of the situation and to overestimate the impact of personal disposition."}, {"term": "Self-Serving Bias", "definition": "The tendency to perceive ourselves favorably."}, {"term": "External Locus of Control", "definition": "The belief that chance or outside forces beyond your personal control determine your fate."}, {"term": "Internal Locus of Control", "definition": "The belief that you control your own fate."}, {"term": "Mere Exposure Effect", "definition": "The tendency for repeated exposure to stimuli to increase our liking of them."}, {"term": "Self-Fulfilling Prophecy", "definition": "A belief that leads to its own fulfillment."}, {"term": "Person Perception", "definition": "How we form impressions of ourselves and others, including attributions of behavior."}, {"term": "Social Comparison (Upward/Downward)", "definition": "When we compare ourselves to others, we judge whether we’re succeeding or failing. When we compare upward, our self-esteem rises. When we compare downward, our self-esteem plummets."}, {"term": "Relative Deprivation", "definition": "The tendency for one to judge their own sense of deprivation in comparison to others."}, {"term": "Stereotype", "definition": "A generalized concepts about groups."}, {"term": "Prejudice", "definition": "An unjustifiable and negative attitude toward a group and its members, it generally involves negative emotions, stereotyped beliefs, and a predisposition to discriminatory action."}, {"term": "Discrimination", "definition": "The unjustifiable negative behavior toward a group or its members."}, {"term": "Implicit Attitude", "definition": "The attitudes that individuals hold but may be unaware of or may not acknowledge."}, {"term": "Just-World Phenomenon", "definition": "The tendency for people to believe the world is just and that people therefore get what they deserve."}, {"term": "In-Group", "definition": "People with whom we share a common identity."}, {"term": "Out-Group", "definition": "Those perceived as different or apart from our ingroup."}, {"term": "Out-Group Homogeneity Bias", "definition": "The tendency to believe members of other groups apart from ours are very similar."}, {"term": "In-group Bias", "definition": "The tendency to favor our own group."}, {"term": "Ethnocentrism", "definition": "The tendency to view our own ethnic or racial group as superior."}, {"term": "Belief Perseverance", "definition": "When a belief persists even if evidence suggests it is not accurate."}, {"term": "Cognitive Dissonance", "definition": "The mental discomfort that occurs when actions or attitudes are in conflict. People are motivated to reduce the discomfort by changing either actions or attitudes to be more in line with each other."}, {"term": "Social Norms", "definition": "A society’s expectations and roles for its members in individual and social situations. Norms prescribe “proper” behavior in individual and social situations."}, {"term": "Social Influence Theory", "definition": "Proposes that social pressure to behave or think in certain ways can be normative or informational."}, {"term": "Normative social influence", "definition": "Social influence resulting from a person’s desire to gain approval or avoid disapproval, for example, when we conform to a group to fit in."}, {"term": "Informational social influence", "definition": "Social influence resulting from a person’s willingness to accept others’ opinions about reality."}, {"term": "Persuasion", "definition": "The techniques applied to convince the self or others of particular ideas, actions, or beliefs."}, {"term": "Central Route Persuasion", "definition": "Occurs when interested people’s thinking is influenced by considering evidence and arguments."}, {"term": "Peripheral Route to Persuasion", "definition": "Occurs when people are influenced by incidental cues, such as when an individual uses bright colors, celebrity endorsements, or other non-important factors to increase compliance."}, {"term": "Halo Effect", "definition": "Occurs when a person forms a positive impression of another based on one aspect of their character, which then influences their evaluation of the person in other circumstances."}, {"term": "Foot-in-the-Door Technique", "definition": "The tendency for people who have first agreed to a small request to comply later with a larger request."}, {"term": "Door-in-the-Face Technique", "definition": "The tendency for people who have first turned down a big request to comply later with a smaller request."}, {"term": "Conformity", "definition": "Adjusting our behavior or thinking to coincide with unspoken rules, norms, or expectations."}, {"term": "Obedience", "definition": "Complying with an order or a command of an authority figure."}, {"term": "Individualism", "definition": "A cultural pattern that emphasizes people’s own goals over group goals and defines identity mainly in terms of unique personal attributes."}, {"term": "Collectivism", "definition": "A cultural pattern that prioritizes the goals of important groups (often one’s extended family or work group)."}, {"term": "Multiculturalism", "definition": "A cultural pattern that recognizes and celebrates diversity by promoting equal respect for all cultures within a society."}, {"term": "Group Polarization", "definition": "Occurs when the decision an individual reaches after talking it through with a group becomes more extreme (positive or negative) than their original opinion."}, {"term": "Group Think", "definition": "The process of making decisions in a group in such a way as to discourage dissenting, different, or even creative input from the members in order to maintain harmony."}, {"term": "Diffusion of Responsibility", "definition": "The mode of thinking where an individual feels less responsible for taking action or making decisions when they are part of a group because they assume someone else will take on the responsibility."}, {"term": "Social Loafing", "definition": "The tendency for people in a group to exert less effort when pooling their efforts toward attaining a common goal than when individually accountable."}, {"term": "Deindividuation", "definition": "The loss of self-awareness and self-restraint occurring in group situations that foster arousal and anonymity."}, {"term": "Social Facilitation", "definition": "In the presence of others, improved performance on simple or well-learned tasks, and worsened performance on difficult tasks."}, {"term": "False Consensus Effect", "definition": "The tendency for people to overestimate the levels to which others agree with them."}, {"term": "Superordinate Goals", "definition": "Goals that unite disparate groups under a common goal and help reduce negative affect and stereotyping among groups."}, {"term": "I/O Psychologist", "definition": "Study how people perform in the workplace, the best practices in management of work, relationships among people working together or for a common company or program, and how people feel about work (burnout)."}, {"term": "Altruism", "definition": "Unselfish regard for the welfare of others."}, {"term": "Social Reciprocity Norm", "definition": "An expectation that people will help those who have helped them."}, {"term": "Social-Responsibility Norm", "definition": "An expectation that people will help those needing their help."}, {"term": "Bystander Effect", "definition": "The tendency for any given bystander to be less likely to give aid if other bystanders are present. This demonstrates that situational and attentional variables predict whether someone is likely to help another person."}, {"term": "Situational Variables", "definition": "The presence of others and our cost/benefit analysis applied to the situation."}, {"term": "Attentional Variables", "definition": "Refers to whether we notice."}, {"term": "Psychodynamic Theories of Personality", "definition": "Theories that claim personality is driven by the unconscious mind and focus on the importance of childhood experiences."}, {"term": "Unconscious", "definition": "A reservoir of mostly unacceptable thoughts, wishes, feelings, and memories; information processing of which we are unaware."}, {"term": "Personality", "definition": "An individual’s characteristic pattern of thinking, feeling, and acting."}, {"term": "Ego Defense Mechanism", "definition": "The ego’s protective methods of reducing anxiety by unconsciously distorting reality."}, {"term": "Denial", "definition": "The basic defense mechanism that refuses to believe or even perceive painful realities."}, {"term": "Displacement", "definition": "The basic defense mechanism where one shifts their impulses toward a more acceptable or less threatening object or person."}, {"term": "Projection", "definition": "The basic defense mechanism where one disguises their threatening impulses by attributing them to others."}, {"term": "Rationalization", "definition": "The basic defense mechanism which involves actively crafting reasons to explain anxiety-provoking thoughts and feelings, even if the explanations seem unlikely."}, {"term": "Reaction Formation", "definition": "The basic defense mechanism that switches unacceptable impulses into their opposite."}, {"term": "Regression", "definition": "The basic defense mechanism that causes us to retreat to an earlier stage, where some psychic energy remains fixated."}, {"term": "Sublimation", "definition": "The basic defense mechanism that transfers unacceptable impulses into socially valued motives."}, {"term": "Projective Tests", "definition": "An assessment that provides ambiguous images designed to trigger projection of one’s inner dynamics and explore the preconscious and unconscious mind."}, {"term": "Preconscious", "definition": "A reservoir of mostly thoughts, feelings, and impulses not presently in awareness but that can be retrieved into conscious awareness."}, {"term": "Humanistic Theory of Personality", "definition": "Theories that view personality with a focus on the potential for healthy personal growth."}, {"term": "Unconditional (Positive) Regard", "definition": "A caring, accepting, nonjudgmental attitude, which humanistic psychologists believe help clients develop self-awareness and self-acceptance."}, {"term": "Self-Actualizing Tendency", "definition": "The ultimate psychological needs that arise after basic physical and psychological needs are met and self-esteem is achieved; the motivation to fulfill one’s potential."}, {"term": "Social-Cognitive Theory of Personality", "definition": "Proposes reciprocal determinism shapes personality. Reciprocal determinism explores self-concept and how self-efficacy and self-esteem both contribute to self-concept."}, {"term": "Reciprocal Determinism", "definition": "The interacting influences of behavior, internal cognition, and environment."}, {"term": "Self-Concept", "definition": "All our thoughts and feelings about ourselves that answer the question, “Who am I?”Self-EfficacyOur sense of competence and effectiveness."}, {"term": "Self-Esteem", "definition": "Our feelings of high or low self-worth."}, {"term": "Trait Theories", "definition": "Conclude that personality involves a set of enduring characteristics that lead to typical responses to stimuli."}, {"term": "Trait", "definition": "Our enduring characteristics or a disposition to feel and act in certain ways, as assessed by self-report inventories and peer reports."}, {"term": "Big Five Theory", "definition": "Proposes that traits of agreeableness, openness to experience, extraversion, conscientiousness, and emotional stability make up one’s personality. These traits are measured by specialized personality inventories that use factor analysis to organize item responses."}, {"term": "Openness", "definition": "Low Score: Prefers routine, resistant to new ideas, not very creative.High Score: Prefers variety, imaginative, takes on new challenges."}, {"term": "Extraversion", "definition": "Low Score: Reserved, avoids spotlight, quietHigh Score: Sociable, talkative, outgoing."}, {"term": "Agreeableness", "definition": "Low Score: Suspicious, uncooperative, self-centeredHigh Score: Trusting, empathetic, helpful."}, {"term": "Conscientiousness", "definition": "Low Score: Disorganized, procrastinates, impulsiveHigh Score: Organized, self-controlled, and goal-directed."}, {"term": "Emotional Stability", "definition": "Low Score: Calm, handles stress well, stable emotionsHigh Score: Anxious, worrisome, insecure."}, {"term": "Personality Inventory", "definition": "A questionnaire in order to measure an individual’s personality by asking standardized questions about their traits, behaviors, and beliefs."}, {"term": "Factor Analysis", "definition": "A statistical procedure that can be used to identify clusters of behaviors that tap basic components of a trait."}, {"term": "Motivation", "definition": "A need or desire that energizes and directs behavior."}, {"term": "Drive-Reduction Theory", "definition": "The theory that a physiological need creates an aroused state (a drive) that motivates an organism to satisfy the need and addresses how certain behaviors help maintain homeostasis."}, {"term": "Homeostasis", "definition": "A tendency to maintain a balanced or constant internal state; the regulation of any aspect of body chemistry, such as blood glucose, around a particular level."}, {"term": "Arousal Theory", "definition": "The theory focuses on finding the right level of stimulation. Addresses how people seek an optimal level of arousal when they behave.This theory posits that too much anxiety/arousal can be distressful and detrimental across a wide range of performance domains."}, {"term": "Yerkes-Dodson Law", "definition": "The principle that performance increases with arousal only up to a point, beyond which performance decreases."}, {"term": "Self-Determination Theory", "definition": "The theory that we feel motivated by intrinsic (internal) or extrinsic (external) motivations."}, {"term": "Intrinsic Motivation", "definition": "The desire to perform a behavior effectively for its own sake."}, {"term": "Extrinsic Motivation", "definition": "The desire to perform a behavior to receive promised rewards or avoid threatened punishment."}, {"term": "Incentive Theory", "definition": "The theory that explores the role of rewards (an extrinsic motivation) in motivating behavior."}, {"term": "Instincts", "definition": "An innate and fixed pattern of behavior that is rigidly patterned throughout a species and is unlearned in animals."}, {"term": "Lewin’s Motivational Conflict Theory", "definition": "Proposes that choices create conflicts one must resolve as the basis of motivation. The type of conflicts faced include approach-approach, approach-avoidance, and avoidance-avoidance."}, {"term": "Approach-Approach Conflict", "definition": "Wanting two things, but only being able to have one. You have to miss out."}, {"term": "Approach-Avoidance Conflict", "definition": "Not wanting either choice, but having to choose at least one unpleasant thing."}, {"term": "Avoidance-Avoidance Conflict", "definition": "Wanting otions", "definition": "Anger, Disgust, Sadness, Happiness, Surprise, and Fear."}, {"term": "Display Rules", "definition": "The social and cultural norms that dictate how and when emotions should be expressed in different contexts. Research demonstrates that rules for displaying emotions vary based on culture."}, {"term": "Elicitors", "definition": "A specific stimulus or event that triggers how people from different genders, ages, or socioeconomic classes within a culture interpret emotions."}, {"term": "Health Psychology", "definition": "Subfield of psychology that explores the impact of psychological, behavioral, and cultural factors on physical health and wellness."}, {"term": "Stress", "definition": "The process by which we perceive and respond to certain events, called stressors, that we appraise as threatening or challenging. Linked to physiological issues such as hypertension, headaches, and immune suppression."}, {"term": "Hypertension", "definition": "High blood pressure resulting from stress."}, {"term": "Immune Suppression", "definition": "A weakened immune system, making the body more vulnerable to infections and diseases, resulting from stress."}, {"term": "Eustress (Motivating Stressor)", "definition": "Challenging, motivating stressor, out of your comfort zone, but can lead to growth."}, {"term": "General Adaptation Syndrome (GAS)", "definition": "Describes the process of experiencing stress. Initially, an alarm reaction occurs when the stress is encountered. Then, a resistance phase occurs as the stress is confronted. Finally, an exhaustion phase occurs when the stress subsides, or resources are spent.Alarm ReactionFight, flight or freeze. Sudden activation of the sympathetic nervous system.Resistance Phase'Handling it.' With excess adrenaline the body and brain rise to the challenge."}, {"term": "Exhaustion Phase", "definition": "The body cannot fight the stressor, the stress response, and continue to repair tissue and fight infection. This phase has the greatest susceptibility to illness."}, {"term": "Tend-and-Befriend Theory", "definition": "Proposes that people (mostly women) react to stress by tending to their own needs and/or the needs of others and seeking connection with others."}, {"term": "Gratitude", "definition": "An appreciation for the positive aspects of life; a positive subjective experience that increases subjective well-being."}, {"term": "Subjective Well-Being", "definition": "A state of happiness with low distress and overall good physical and mental health based on personal feelings and interpretations."}, {"term": "Signature Strengths (Virtues)", "definition": "The characteristics that are most defining for an individual which include: wisdom, courage, humanity, justice, temperance and transcendence."}, {"term": "Posttraumatic Growth", "definition": "A positive subjective experience that may result after the experience of trauma or stress."}, {"term": "Psychological Disorders", "definition": "A collection of symptoms marked by disruption to cognition, emotions, or behaviors that causes distress or suffering."}, {"term": "Dysfunction", "definition": "Impairment or disturbance in behavior."}, {"term": "Distress", "definition": "A worrisome behavior that causes anxiety."}, {"term": "Deviation", "definition": "Behavior that is not typical of one’s society’s normal behavior."}, {"term": "Diagnostic and Statistical Manual (DSM) of Mental Disorders", "definition": "Developed by the American Psychiatric Association to classify mental disorders, it cannot explain the cause of the disorder."}, {"term": "Developed by the World", "definition": "Health Organization to classify mental disorders."}, {"term": "Eclectic Approach", "definition": "Using more than one psychological perspective when diagnosing and treating clients, this is employed by most psychologists."}, {"term": "Biopsychosocial Model", "definition": "Proposes that any psychological problem potentially involves a combination of biological ty."}, {"term": "Ataque de Nervios", "definition": "A culture bound anxiety disorder experienced mainly by people of Caribbean or Iberian descent."}, {"term": "Social", "definition": "Anxiety DisordersDisorders marked by the intense fear of being judged or watched by others. It is distinct from but may include agoraphobia (fear of social situations)."}, {"term": "Taijin Kyofusho", "definition": "A culture-bound anxiety disorder experienced mainly by Japanese people in which people fear others are judging their bodies as undesirable, offensive, or unpleasant."}, {"term": "Generalized Anxiety Disorder (GAD)", "definition": "A disorder marked by prolonged experiences of nonspecific anxiety or fear."}, {"term": "Hoarding Disorder", "definition": "A disorder marked by difficulty parting with possessions, regardless of their value."}, {"term": "Dissociative Amnesia", "definition": "Memory loss that is not due to a physical cause and is often related to stress or trauma."}, {"term": "Fugue", "definition": "A temporary state where a person experiences memory loss and ends up in an unexpected place."}, {"term": "Dissociative Identity Disorder (DID)", "definition": "A disorder marked by a person exhibits two or more distinct and alternating personalities."}, {"term": "Hypervigilance", "definition": "An excessive and heightened state of alertness and awareness."}, {"term": "Post-Traumatic Stress Disorder", "definition": "A disorder marked by haunting memories, nightmares, hypervigilance, avoidance of trauma-related stimuli, social withdrawal, jumpy anxiety, numbness of feeling, and/or insomnia after a traumatic experience."}, {"term": "Anorexia Nervosa", "definition": "A disorder marked by maintaining a starvation diet despite being significantly underweight and having inaccurate self-perception."}, {"term": "Bulimia Nervosa", "definition": "A disorder marked by binge eating, followed by inappropriate weight-loss-promoting behavior, such as vomiting, laxative use, fasting, or res that clinical psychologists be honest in their relationships with clients. Psychologists must not engage in fraud and keep their commitments."}, {"term": "Psychodynamic Therapy", "definition": "Therapy which employs free association and dream interpretation to uncover the unconscious mind."}, {"term": "Free Association", "definition": "A method of exploring the unconscious in which the person relaxes and says whatever comes to mind, no matter how trivial or embarrassing."}, {"term": "Dream Interpretation", "definition": "The therapist noting of supposed dream meanings, resistances and other significant behaviors and events in order to promote insight."}, {"term": "Cognitive Therapy", "definition": "Therapy which employs cognitive restructuring or fear hierarchies to combat maladaptive thinking. It proposes that people should focus on the cognitive triad—negative thoughts about oneself, the world, and the future."}, {"term": "Cognitive Restructuring", "definition": "Changing our destructive thoughts or inappropriate interpretations of the world or our future."}, {"term": "Fear Hierarchies", "definition": "Ranking what causes an individual fear and the circumstances from lowest anxiety-causing to most anxiety-causing."}, {"term": "Maladaptive Thinking", "definition": "Negative and irrational thoughts that contribute to unhealthy behaviors and emotional distress."}, {"term": "Cognitive Triad", "definition": "Negative thoughts about oneself, the world, and the future."}, {"term": "Applied Behavior Analysis", "definition": "The application of principles of conditioning to address mental disorders and developmental disabilities. Exposure therapies (such as systematic desensitization), aversion therapies, and token economies all employ these principles."}, {"term": "Exposure Therapy", "definition": "Technique of behavioral therapy that safely exposes the client to the source of their anxiety."}, {"term": "Systematic Desensitization", "definition": "A type of exposure therapy that associates a pleasant relaxed state with gradually increasing anxiety-triggering stimuli."}, {"term": "Aversion Therapy", "definition": "Technique that conditions a negative or unwanted behavior with an unpleasant stimulus until a strong dislike, an aversion, is created."}, {"term": "Token Economy", "definition": "Technique where a positive behavior is reinforced with small tokens whenever the behavior is done, and then the token can be exchanged for a longer more desired reward."}, {"term": "Biofeedback", "definition": "A technique which uses principles of conditioning to help clients regulate body systems (such as the sympathetic and parasympathetic nervous systems) that contribute to feelings of anxiety or depression."}, {"term": "Cognitive-Behavioral Therapy", "definition": "Therapies, such as dialectical behavior therapy and rational-emotive behavior therapy, which combine techniques from the cognitive and behavioral perspectives to treat mental and behavioral disorders."}, {"term": "Dialectical Behavior Therapy", "definition": "A cognitive-behavioral therapy that aims to assist people with managing intense emotions, improve interpersonal relationships and reduce self-harm behaviors."}, {"term": "Rational-Emotive Behavior Therapy", "definition": "A cognitive-behavioral therapy that vigorously challenges people’s illogical, self-defeating attitudes and assumptions."}, {"term": "Person-Centered Therapy", "definition": "Therapy from the humanistic perspective which employs active listening and unconditional positive regard."}, {"term": "Active Listening", "definition": "Empathic listening in which the listener echoes, restates and seeks clarification."}, {"term": "Unconditional Positive Regard", "definition": "A caring, accepting, non judgemental attitude believed to help clients develop self-awareness and self-acceptance."}, {"term": "Individual Therapy", "definition": "Expensive therapy which may take longer depending on the issue which focuses on one patient at a time."}, {"term": "Group Therapy", "definition": "Self help therapy used for couples/marriages and families which promote healthier coping skills such as problem-solving assertiveness and listening; it reduces isolation and hopelessness."}, {"term": "Hypnosis", "definition": "A social interaction in which the hypnotist suggests to the subject certain perceptions, feelings, thoughts, or behaviors will spontaneously occur. It is effective in treating pain and anxiety however does not assist in retrieving accurate memories or regressing in age."}, {"term": "Psychoactive medications", "definition": "Medications which interact with specific neurotransmitters in the central nervous system to address possible biochemical causes of mental disorders. Side effects of certain medications may cause tardive dyskinesia."}, {"term": "Antidepressants", "definition": "Drugs used to treat depressive, anxiety, obsessive-compulsive and posttraumatic stress disorders. Related drugs and neurotransmitters include Prozac, Serotonin and Norepinephrine."}, {"term": "Antianxiety Drugs", "definition": "Drugs used to control anxiety and agitation. Related drugs and neurotransmitters include Xanax and GABA."}, {"term": "Lithium", "definition": "Mood-stabilizing medication primarily used to treat bipolar disorder, helping to balance mood swings and prevent manic and depressive episodes."}, {"term": "Antipsychotic Medications", "definition": "Drugs used to treat schizophrenia and other forms of severe thought disorders. Related drugs and neurotransmitters include Thorazine and Dopamine."}, {"term": "Tardive Dyskinesia", "definition": "A movement disorder related to the regulation of dopamine in the nervous system."}, {"term": "Psychosurgery", "definition": "Surgery that removes or destroys brain tissue in an effort to change behavior."}, {"term": "Transcranial Magnetic Stimulation (TMS)", "definition": "The application of repeated pulses of magnetic energy to the brain; used to stimulate or suppress brain activity."}, {"term": "Electroconvulsive Therapy (ECT)", "definition": "A biomedical therapy for severe depression in which a brief electric current is sent through the brain of an anesthetized individual."}, {"term": "Lobotomy", "definition": "An irreversible psychosurgical procedure once used to calm uncontrollably emotional or violent patients which cut the nerves connecting the frontal lobes to the emotion-controlling centers of the inner brain."}, {"term": "Replication", "definition": "Repeating the essence of a research study, usually with different participants in different situations, to see whether the basic finding extends to other participants and circumstances."}, {"term": "Amygdala", "definition": "Two almond-shaped structures in the limbic system linked to emotions such as anger, aggression, and fear. It also helps ingrain highly emotional memories."}, {"term": "Association Areas", "definition": "Areas of the cerebral cortex that are not involved in primary motor or sensory functions; they are involved in higher mental functions such as learning, remembering, thinking, and speaking."}, {"term": "Sleep", "definition": "Periodic, natural loss of consciousness, distinct from unconsciousness resulting from a coma, general anesthesia, or hibernation."}, {"term": "NREM sleep", "definition": "Non–rapid eye movement sleep; occurs in Stages 1 through 3 and decreases in duration throughout the cycle."}, {"term": "Hypnagogic Sensations", "definition": "Brief hallucinations that occur as one enters initial Stage 1 sleep, such as a sensation of falling or floating."}, {"term": "Sensory Adaptation", "definition": "Diminished sensitivity as a consequence of constant stimulation."}, {"term": "Gestalt Psychology", "definition": "School of psychology focused on explaining how humans organize their perceptual world as a whole."}, {"term": "Inattentional Blindness", "definition": "Failing to see visible objects when attention is directed elsewhere.     function startGame() {
      deck = shuffle(VOCAB);
      index = 0;
      score = 0;
      missed = 0;
      streak = 0;
      locked = false;
      updateStats();
      loadQuestion();
    }

    function getChoices(answer) {
      const wrong = shuffle(VOCAB.filter(v => v.term !== answer.term)).slice(0, 3);
      return shuffle([answer, ...wrong]);
    }

    function loadQuestion() {
      if (index >= deck.length) {
        definitionEl.textContent = 'Finished! Restart to practice again.';
        choicesEl.innerHTML = '';
        feedbackEl.textContent = `Final score: ${score} correct, ${missed} missed.`;
        feedbackEl.className = 'feedback good';
        return;
      }

      current = deck[index];
      locked = false;
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      definitionEl.textContent = current.definition;
      choicesEl.innerHTML = '';

      getChoices(current).forEach((choice, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerHTML = `<span style="color: var(--muted); margin-right: 8px;">${i + 1}.</span> ${choice.term}`;
        btn.onclick = () => checkAnswer(btn, choice.term);
        choicesEl.appendChild(btn);
      });
      updateStats();
    }

    function checkAnswer(button, selectedTerm) {
      if (locked) return;
      locked = true;
      const buttons = [...document.querySelectorAll('.choice')];
      buttons.forEach(btn => {
        if (btn.textContent.includes(current.term)) btn.classList.add('correct');
      });

      if (selectedTerm === current.term) {
        score++;
        streak++;
        feedbackEl.textContent = 'Correct.';
        feedbackEl.className = 'feedback good';
      } else {
        missed++;
        streak = 0;
        button.classList.add('wrong');
        feedbackEl.textContent = `Wrong. Correct answer: ${current.term}`;
        feedbackEl.className = 'feedback bad';
      }
      updateStats();
    }

    function nextQuestion() {
      if (index < deck.length) index++;
      loadQuestion();
    }

    function showAnswer() {
      if (!current || locked) return;
      locked = true;
      missed++;
      streak = 0;
      [...document.querySelectorAll('.choice')].forEach(btn => {
        if (btn.textContent.includes(current.term)) btn.classList.add('correct');
      });
      feedbackEl.textContent = `Answer: ${current.term}`;
      feedbackEl.className = 'feedback good';
      updateStats();
    }

    function updateStats() {
      scoreEl.textContent = score;
      missedEl.textContent = missed;
      streakEl.textContent = streak;
      progressEl.textContent = `${Math.min(index + 1, deck.length)}/${deck.length}`;
      totalPill.textContent = `${VOCAB.length} words loaded`;
    }

    function renderList(filter = '') {
      const q = filter.trim().toLowerCase();
      const results = VOCAB.filter(v =>
        v.term.toLowerCase().includes(q) || v.definition.toLowerCase().includes(q)
      ).slice(0, 80);
      listEl.innerHTML = results.map(v => `
        <div class="item">
          <strong>${escapeHtml(v.term)}</strong>
          <p>${escapeHtml(v.definition)}</p>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag]));
    }

    document.getElementById('nextBtn').onclick = nextQuestion;
    document.getElementById('showBtn').onclick = showAnswer;
    document.getElementById('restartBtn').onclick = startGame;
    searchEl.addEventListener('input', e => renderList(e.target.value));

    document.addEventListener('keydown', e => {
      if (e.key >= '1' && e.key <= '4') {
        const btn = document.querySelectorAll('.choice')[Number(e.key) - 1];
        if (btn) btn.click();
      }
      if (e.key === 'Enter') nextQuestion();
      if (e.key.toLowerCase() === 's') showAnswer();
    });

    renderList();
    startGame();
  </script>
</body>
</html>
